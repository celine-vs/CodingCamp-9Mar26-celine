<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Task Rendering - Task 6.1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .task-item.completed {
            opacity: 0.6;
            background-color: #f0f0f0;
        }
        .task-item.completed .task-description {
            text-decoration: line-through;
        }
        .task-checkbox {
            cursor: pointer;
        }
        .task-description {
            flex: 1;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
        }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Task 6.1: Task Rendering Methods Test</h1>
    
    <div class="test-section">
        <h2>Test Setup</h2>
        <button onclick="runTests()">Run All Tests</button>
        <button onclick="clearTests()">Clear Results</button>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="test-results"></div>
    </div>

    <div class="test-section">
        <h2>Visual Test: Task List</h2>
        <ul class="task-list" id="task-list"></ul>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Test utilities
        function assert(condition, message) {
            const result = document.createElement('div');
            if (condition) {
                result.innerHTML = `<span class="pass">✓ PASS:</span> ${message}`;
            } else {
                result.innerHTML = `<span class="fail">✗ FAIL:</span> ${message}`;
            }
            document.getElementById('test-results').appendChild(result);
            return condition;
        }

        function clearTests() {
            document.getElementById('test-results').innerHTML = '';
            document.getElementById('task-list').innerHTML = '';
            TaskManager.tasks = [];
        }

        function runTests() {
            clearTests();
            
            console.log('Starting Task 6.1 tests...');

            // Test 1: renderTask creates proper DOM structure
            console.log('Test 1: renderTask creates proper DOM structure');
            const testTask = {
                id: 'test-1',
                description: 'Test task description',
                completed: false,
                createdAt: Date.now()
            };
            
            const taskElement = TaskManager.renderTask(testTask);
            
            assert(taskElement.tagName === 'LI', 'renderTask returns an LI element');
            assert(taskElement.classList.contains('task-item'), 'Task element has task-item class');
            assert(taskElement.getAttribute('data-task-id') === 'test-1', 'Task element has correct data-task-id attribute');
            
            // Test 2: renderTask creates all required child elements
            console.log('Test 2: renderTask creates all required child elements');
            const checkbox = taskElement.querySelector('.task-checkbox');
            const description = taskElement.querySelector('.task-description');
            const editBtn = taskElement.querySelector('.btn-edit-task');
            const deleteBtn = taskElement.querySelector('.btn-delete-task');
            
            assert(checkbox !== null, 'Task has checkbox element');
            assert(checkbox.type === 'checkbox', 'Checkbox has correct type');
            assert(description !== null, 'Task has description span');
            assert(description.textContent === 'Test task description', 'Description has correct text');
            assert(editBtn !== null, 'Task has edit button');
            assert(editBtn.textContent === 'Edit', 'Edit button has correct text');
            assert(deleteBtn !== null, 'Task has delete button');
            assert(deleteBtn.textContent === 'Delete', 'Delete button has correct text');

            // Test 3: Completed task has proper styling
            console.log('Test 3: Completed task has proper styling');
            const completedTask = {
                id: 'test-2',
                description: 'Completed task',
                completed: true,
                createdAt: Date.now()
            };
            
            const completedElement = TaskManager.renderTask(completedTask);
            assert(completedElement.classList.contains('completed'), 'Completed task has completed class');
            
            const completedCheckbox = completedElement.querySelector('.task-checkbox');
            assert(completedCheckbox.checked === true, 'Completed task checkbox is checked');

            // Test 4: renderTasks updates entire list
            console.log('Test 4: renderTasks updates entire list');
            TaskManager.tasks = [
                { id: '1', description: 'Task 1', completed: false, createdAt: 1 },
                { id: '2', description: 'Task 2', completed: true, createdAt: 2 },
                { id: '3', description: 'Task 3', completed: false, createdAt: 3 }
            ];
            
            TaskManager.renderTasks();
            
            const taskList = document.getElementById('task-list');
            const renderedTasks = taskList.querySelectorAll('.task-item');
            
            assert(renderedTasks.length === 3, 'renderTasks renders all 3 tasks');
            assert(renderedTasks[0].getAttribute('data-task-id') === '1', 'First task has correct ID');
            assert(renderedTasks[1].getAttribute('data-task-id') === '2', 'Second task has correct ID');
            assert(renderedTasks[2].getAttribute('data-task-id') === '3', 'Third task has correct ID');

            // Test 5: Task order preservation (Requirement 3.2)
            console.log('Test 5: Task order preservation');
            const descriptions = Array.from(renderedTasks).map(el => 
                el.querySelector('.task-description').textContent
            );
            assert(
                descriptions[0] === 'Task 1' && descriptions[1] === 'Task 2' && descriptions[2] === 'Task 3',
                'Tasks are rendered in creation order (Requirement 3.2)'
            );

            // Test 6: Completed task visual indicator (Requirement 3.4)
            console.log('Test 6: Completed task visual indicator');
            const completedTasks = taskList.querySelectorAll('.task-item.completed');
            assert(completedTasks.length === 1, 'One task has completed class');
            assert(
                completedTasks[0].getAttribute('data-task-id') === '2',
                'Correct task has completed styling (Requirement 3.4)'
            );

            // Test 7: renderTasks clears previous content
            console.log('Test 7: renderTasks clears previous content');
            TaskManager.tasks = [
                { id: '4', description: 'New Task', completed: false, createdAt: 4 }
            ];
            TaskManager.renderTasks();
            
            const newRenderedTasks = taskList.querySelectorAll('.task-item');
            assert(newRenderedTasks.length === 1, 'renderTasks clears old tasks and renders new ones');
            assert(newRenderedTasks[0].getAttribute('data-task-id') === '4', 'Only new task is rendered');

            // Test 8: Empty task list
            console.log('Test 8: Empty task list');
            TaskManager.tasks = [];
            TaskManager.renderTasks();
            
            const emptyList = taskList.querySelectorAll('.task-item');
            assert(emptyList.length === 0, 'renderTasks handles empty task array');

            console.log('All tests completed!');
        }

        // Run tests automatically on load
        window.addEventListener('load', () => {
            console.log('Page loaded, ready to run tests');
        });
    </script>
</body>
</html>
