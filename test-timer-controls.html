<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer Controls Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .pass { color: green; }
        .fail { color: red; }
        .timer-display {
            font-size: 48px;
            font-family: monospace;
            margin: 20px 0;
        }
        .timer-status {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }
        .timer-complete {
            color: green;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Focus Timer Controls Test</h1>
    
    <div class="test-section">
        <h2>Manual Timer Test</h2>
        <div class="timer-display">25:00</div>
        <div class="timer-controls">
            <button class="btn-start">Start</button>
            <button class="btn-stop">Stop</button>
            <button class="btn-reset">Reset</button>
        </div>
        <div class="timer-status"></div>
    </div>

    <div class="test-section">
        <h2>Automated Tests</h2>
        <div id="test-results"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', () => {
            const results = document.getElementById('test-results');
            
            function addResult(testName, passed, message = '') {
                const div = document.createElement('div');
                div.className = passed ? 'pass' : 'fail';
                div.textContent = `${passed ? '✓' : '✗'} ${testName}${message ? ': ' + message : ''}`;
                results.appendChild(div);
            }

            // Initialize timer
            FocusTimer.init();

            // Test 1: Initial state
            addResult('Initial state', 
                FocusTimer.state.remaining === 1500 && 
                !FocusTimer.state.isRunning &&
                FocusTimer.state.intervalId === null,
                'Timer should start at 1500 seconds, not running'
            );

            // Test 2: Start creates interval
            FocusTimer.start();
            addResult('Start creates interval', 
                FocusTimer.state.isRunning && 
                FocusTimer.state.intervalId !== null,
                'Timer should be running with interval ID'
            );

            // Test 3: Multiple start calls don't create multiple intervals
            const firstIntervalId = FocusTimer.state.intervalId;
            FocusTimer.start();
            addResult('Guard prevents multiple intervals', 
                FocusTimer.state.intervalId === firstIntervalId,
                'Interval ID should remain the same'
            );

            // Test 4: Stop preserves remaining time
            setTimeout(() => {
                const remainingBeforeStop = FocusTimer.state.remaining;
                FocusTimer.stop();
                
                addResult('Stop preserves state', 
                    FocusTimer.state.remaining === remainingBeforeStop &&
                    !FocusTimer.state.isRunning &&
                    FocusTimer.state.intervalId === null,
                    `Remaining time preserved at ${remainingBeforeStop} seconds`
                );

                // Test 5: Reset returns to 1500
                FocusTimer.reset();
                addResult('Reset returns to 1500', 
                    FocusTimer.state.remaining === 1500 &&
                    !FocusTimer.state.isRunning,
                    'Timer should be at 1500 seconds and not running'
                );

                // Test 6: Tick decrements time
                FocusTimer.state.remaining = 10;
                FocusTimer.tick();
                addResult('Tick decrements time', 
                    FocusTimer.state.remaining === 9,
                    'Remaining should decrease by 1 second'
                );

                // Test 7: Timer stops at zero
                FocusTimer.state.remaining = 1;
                FocusTimer.state.isRunning = true;
                FocusTimer.tick();
                addResult('Timer stops at zero', 
                    FocusTimer.state.remaining === 0 &&
                    !FocusTimer.state.isRunning,
                    'Timer should stop automatically at zero'
                );

                // Test 8: Completion shows visual indication
                const statusElement = document.querySelector('.timer-status');
                addResult('Completion visual indication', 
                    statusElement.textContent === 'Session Complete!' &&
                    statusElement.classList.contains('timer-complete'),
                    'Status should show completion message'
                );

                // Test 9: Reset clears completion state
                FocusTimer.reset();
                addResult('Reset clears completion state', 
                    statusElement.textContent === '' &&
                    !statusElement.classList.contains('timer-complete'),
                    'Status should be cleared after reset'
                );

                // Test 10: Format time correctly
                const formatted = FocusTimer.formatTime(1500);
                addResult('Format time correctly', 
                    formatted === '25:00',
                    `1500 seconds should format as 25:00, got ${formatted}`
                );

                // Test 11: Format time with single digit minutes
                const formatted2 = FocusTimer.formatTime(65);
                addResult('Format time with padding', 
                    formatted2 === '01:05',
                    `65 seconds should format as 01:05, got ${formatted2}`
                );

            }, 2500); // Wait 2.5 seconds to let timer tick a few times
        });
    </script>
</body>
</html>
