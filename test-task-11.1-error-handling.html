<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 11.1 - Local Storage Error Handling Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
        }
        .test-section.fail {
            border-left-color: #f44336;
        }
        .test-section h3 {
            margin-top: 0;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            background-color: #f0f0f0;
        }
        .pass {
            color: #4CAF50;
            font-weight: bold;
        }
        .fail {
            color: #f44336;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>
    <h1>Task 11.1 - Local Storage Error Handling Verification</h1>
    <p>This test verifies that all Local Storage operations have proper error handling.</p>

    <div id="test-results"></div>

    <script src="js/app.js"></script>
    <script>
        const resultsDiv = document.getElementById('test-results');

        function addTestResult(title, passed, details) {
            const section = document.createElement('div');
            section.className = 'test-section' + (passed ? '' : ' fail');
            
            const heading = document.createElement('h3');
            heading.textContent = title;
            
            const result = document.createElement('div');
            result.className = 'result';
            result.innerHTML = `<span class="${passed ? 'pass' : 'fail'}">${passed ? '✓ PASS' : '✗ FAIL'}</span><br>${details}`;
            
            section.appendChild(heading);
            section.appendChild(result);
            resultsDiv.appendChild(section);
        }

        // Test 1: Verify JSON.parse() error handling in loadTasks()
        function testCorruptedTaskData() {
            console.log('Test 1: Corrupted task data handling');
            
            // Set corrupted JSON data
            localStorage.setItem('productivity-dashboard-tasks', 'invalid json {{{');
            
            // Try to load tasks - should handle error gracefully
            const tasks = TaskManager.loadTasks();
            
            // Verify it returns empty array and clears corrupted data
            const passed = Array.isArray(tasks) && 
                          tasks.length === 0 && 
                          localStorage.getItem('productivity-dashboard-tasks') === null;
            
            addTestResult(
                'Test 1: Corrupted Task Data (JSON.parse error)',
                passed,
                `Expected: Empty array and cleared storage<br>Got: ${JSON.stringify(tasks)}, Storage cleared: ${localStorage.getItem('productivity-dashboard-tasks') === null}`
            );
            
            return passed;
        }

        // Test 2: Verify JSON.parse() error handling in loadLinks()
        function testCorruptedLinkData() {
            console.log('Test 2: Corrupted link data handling');
            
            // Set corrupted JSON data
            localStorage.setItem('productivity-dashboard-links', 'not valid json');
            
            // Try to load links - should handle error gracefully
            const links = QuickLinks.loadLinks();
            
            // Verify it returns empty array and clears corrupted data
            const passed = Array.isArray(links) && 
                          links.length === 0 && 
                          localStorage.getItem('productivity-dashboard-links') === null;
            
            addTestResult(
                'Test 2: Corrupted Link Data (JSON.parse error)',
                passed,
                `Expected: Empty array and cleared storage<br>Got: ${JSON.stringify(links)}, Storage cleared: ${localStorage.getItem('productivity-dashboard-links') === null}`
            );
            
            return passed;
        }

        // Test 3: Verify non-array data handling in loadTasks()
        function testNonArrayTaskData() {
            console.log('Test 3: Non-array task data handling');
            
            // Set non-array JSON data
            localStorage.setItem('productivity-dashboard-tasks', JSON.stringify({ not: 'an array' }));
            
            // Try to load tasks - should return empty array
            const tasks = TaskManager.loadTasks();
            
            // Verify it returns empty array
            const passed = Array.isArray(tasks) && tasks.length === 0;
            
            addTestResult(
                'Test 3: Non-Array Task Data',
                passed,
                `Expected: Empty array<br>Got: ${JSON.stringify(tasks)}`
            );
            
            return passed;
        }

        // Test 4: Verify non-array data handling in loadLinks()
        function testNonArrayLinkData() {
            console.log('Test 4: Non-array link data handling');
            
            // Set non-array JSON data
            localStorage.setItem('productivity-dashboard-links', JSON.stringify('string data'));
            
            // Try to load links - should return empty array
            const links = QuickLinks.loadLinks();
            
            // Verify it returns empty array
            const passed = Array.isArray(links) && links.length === 0;
            
            addTestResult(
                'Test 4: Non-Array Link Data',
                passed,
                `Expected: Empty array<br>Got: ${JSON.stringify(links)}`
            );
            
            return passed;
        }

        // Test 5: Verify saveTasks() has try-catch (we can't easily trigger quota exceeded, but we can verify the method exists and returns boolean)
        function testSaveTasksErrorHandling() {
            console.log('Test 5: saveTasks() error handling structure');
            
            // Clear and add a task
            TaskManager.tasks = [];
            TaskManager.tasks.push({
                id: 'test-1',
                description: 'Test task',
                completed: false,
                createdAt: Date.now()
            });
            
            // Save should succeed and return true
            const result = TaskManager.saveTasks();
            
            // Verify it returns boolean
            const passed = typeof result === 'boolean' && result === true;
            
            addTestResult(
                'Test 5: saveTasks() Returns Boolean',
                passed,
                `Expected: true (boolean)<br>Got: ${result} (${typeof result})`
            );
            
            return passed;
        }

        // Test 6: Verify saveLinks() has try-catch
        function testSaveLinksErrorHandling() {
            console.log('Test 6: saveLinks() error handling structure');
            
            // Clear and add a link
            QuickLinks.links = [];
            QuickLinks.links.push({
                id: 'link-1',
                name: 'Test Link',
                url: 'https://example.com',
                createdAt: Date.now()
            });
            
            // Save should succeed and return true
            const result = QuickLinks.saveLinks();
            
            // Verify it returns boolean
            const passed = typeof result === 'boolean' && result === true;
            
            addTestResult(
                'Test 6: saveLinks() Returns Boolean',
                passed,
                `Expected: true (boolean)<br>Got: ${result} (${typeof result})`
            );
            
            return passed;
        }

        // Test 7: Verify localStorage availability check
        function testLocalStorageAvailability() {
            console.log('Test 7: Local Storage availability check');
            
            // The isLocalStorageAvailable method should exist and return true in normal browser
            const available = App.isLocalStorageAvailable();
            
            const passed = typeof available === 'boolean' && available === true;
            
            addTestResult(
                'Test 7: Local Storage Availability Check',
                passed,
                `Expected: true (storage available)<br>Got: ${available}`
            );
            
            return passed;
        }

        // Test 8: Verify error handling preserves app functionality
        function testAppContinuesAfterError() {
            console.log('Test 8: App continues after storage error');
            
            // Set corrupted data
            localStorage.setItem('productivity-dashboard-tasks', 'corrupted');
            
            // Load tasks (should handle error)
            TaskManager.tasks = TaskManager.loadTasks();
            
            // Try to add a new task - app should still work
            const newTask = TaskManager.addTask('New task after error');
            
            const passed = newTask !== null && 
                          newTask.description === 'New task after error' &&
                          TaskManager.tasks.length === 1;
            
            addTestResult(
                'Test 8: App Continues After Storage Error',
                passed,
                `Expected: Task created successfully<br>Got: ${newTask ? 'Task created' : 'Failed'}, Tasks count: ${TaskManager.tasks.length}`
            );
            
            return passed;
        }

        // Run all tests
        function runAllTests() {
            console.log('=== Starting Task 11.1 Error Handling Tests ===\n');
            
            const results = [];
            
            // Clear storage before tests
            localStorage.clear();
            
            results.push(testCorruptedTaskData());
            results.push(testCorruptedLinkData());
            results.push(testNonArrayTaskData());
            results.push(testNonArrayLinkData());
            results.push(testSaveTasksErrorHandling());
            results.push(testSaveLinksErrorHandling());
            results.push(testLocalStorageAvailability());
            results.push(testAppContinuesAfterError());
            
            // Summary
            const passed = results.filter(r => r).length;
            const total = results.length;
            
            const summary = document.createElement('div');
            summary.className = 'test-section' + (passed === total ? '' : ' fail');
            summary.innerHTML = `
                <h2>Test Summary</h2>
                <div class="result">
                    <strong>${passed}/${total} tests passed</strong><br>
                    ${passed === total ? '<span class="pass">✓ All error handling tests passed!</span>' : '<span class="fail">✗ Some tests failed</span>'}
                </div>
            `;
            resultsDiv.appendChild(summary);
            
            console.log(`\n=== Test Summary: ${passed}/${total} passed ===`);
            
            // Clean up
            localStorage.clear();
        }

        // Run tests when page loads
        runAllTests();
    </script>
</body>
</html>
