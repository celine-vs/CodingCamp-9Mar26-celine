<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Task 7.3 - Link Rendering Methods</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-section h3 {
            margin-top: 0;
        }
        .pass {
            color: green;
            font-weight: bold;
        }
        .fail {
            color: red;
            font-weight: bold;
        }
        .links-container {
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
            padding: 8px;
            background: white;
            border-radius: 4px;
        }
        .link-button {
            flex: 1;
            text-decoration: none;
            color: #0066cc;
        }
        .btn-delete-link {
            background: #ff4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Task 7.3 - Link Rendering Methods Test</h1>
    
    <div class="test-section">
        <h3>Test 1: renderLink() creates correct DOM structure</h3>
        <div id="test1-result"></div>
        <div id="test1-output"></div>
    </div>

    <div class="test-section">
        <h3>Test 2: renderLink() sets correct attributes</h3>
        <div id="test2-result"></div>
        <div id="test2-output"></div>
    </div>

    <div class="test-section">
        <h3>Test 3: renderLinks() renders multiple links</h3>
        <div id="test3-result"></div>
        <div class="links-container" id="test3-container"></div>
    </div>

    <div class="test-section">
        <h3>Test 4: renderLinks() clears existing content</h3>
        <div id="test4-result"></div>
        <div class="links-container" id="test4-container"></div>
    </div>

    <div class="test-section">
        <h3>Test 5: Delete button has × symbol</h3>
        <div id="test5-result"></div>
        <div id="test5-output"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Test 1: renderLink() creates correct DOM structure
        function test1() {
            const testLink = {
                id: 'test-1',
                name: 'Test Link',
                url: 'https://example.com',
                createdAt: Date.now()
            };

            const linkElement = QuickLinks.renderLink(testLink);
            
            const hasLinkItem = linkElement.classList.contains('link-item');
            const hasAnchor = linkElement.querySelector('a') !== null;
            const hasDeleteBtn = linkElement.querySelector('.btn-delete-link') !== null;
            
            const passed = hasLinkItem && hasAnchor && hasDeleteBtn;
            
            document.getElementById('test1-result').innerHTML = passed ? 
                '<span class="pass">✓ PASS</span>' : 
                '<span class="fail">✗ FAIL</span>';
            
            document.getElementById('test1-output').appendChild(linkElement);
            
            return passed;
        }

        // Test 2: renderLink() sets correct attributes
        function test2() {
            const testLink = {
                id: 'test-2',
                name: 'GitHub',
                url: 'https://github.com',
                createdAt: Date.now()
            };

            const linkElement = QuickLinks.renderLink(testLink);
            const anchor = linkElement.querySelector('a');
            
            const hasCorrectHref = anchor.href === 'https://github.com/';
            const hasTargetBlank = anchor.target === '_blank';
            const hasCorrectName = anchor.textContent === 'GitHub';
            const hasDataLinkId = linkElement.getAttribute('data-link-id') === 'test-2';
            const hasRelAttribute = anchor.getAttribute('rel') === 'noopener noreferrer';
            
            const passed = hasCorrectHref && hasTargetBlank && hasCorrectName && hasDataLinkId && hasRelAttribute;
            
            document.getElementById('test2-result').innerHTML = passed ? 
                '<span class="pass">✓ PASS</span>' : 
                '<span class="fail">✗ FAIL</span>';
            
            document.getElementById('test2-output').innerHTML = `
                <ul>
                    <li>href: ${hasCorrectHref ? '✓' : '✗'} ${anchor.href}</li>
                    <li>target: ${hasTargetBlank ? '✓' : '✗'} ${anchor.target}</li>
                    <li>name: ${hasCorrectName ? '✓' : '✗'} ${anchor.textContent}</li>
                    <li>data-link-id: ${hasDataLinkId ? '✓' : '✗'} ${linkElement.getAttribute('data-link-id')}</li>
                    <li>rel: ${hasRelAttribute ? '✓' : '✗'} ${anchor.getAttribute('rel')}</li>
                </ul>
            `;
            
            return passed;
        }

        // Test 3: renderLinks() renders multiple links
        function test3() {
            QuickLinks.links = [
                { id: 'link-1', name: 'Google', url: 'https://google.com', createdAt: Date.now() },
                { id: 'link-2', name: 'GitHub', url: 'https://github.com', createdAt: Date.now() },
                { id: 'link-3', name: 'Stack Overflow', url: 'https://stackoverflow.com', createdAt: Date.now() }
            ];

            // Temporarily replace querySelector to use our test container
            const originalQuerySelector = document.querySelector.bind(document);
            document.querySelector = function(selector) {
                if (selector === '.links-container') {
                    return document.getElementById('test3-container');
                }
                return originalQuerySelector(selector);
            };

            QuickLinks.renderLinks();

            // Restore original querySelector
            document.querySelector = originalQuerySelector;

            const container = document.getElementById('test3-container');
            const linkItems = container.querySelectorAll('.link-item');
            
            const passed = linkItems.length === 3;
            
            document.getElementById('test3-result').innerHTML = passed ? 
                '<span class="pass">✓ PASS</span>' : 
                '<span class="fail">✗ FAIL</span>';
            
            document.getElementById('test3-result').innerHTML += ` (Rendered ${linkItems.length} links)`;
            
            return passed;
        }

        // Test 4: renderLinks() clears existing content
        function test4() {
            const container = document.getElementById('test4-container');
            container.innerHTML = '<div>Old content</div><div>More old content</div>';

            QuickLinks.links = [
                { id: 'link-4', name: 'New Link', url: 'https://example.com', createdAt: Date.now() }
            ];

            // Temporarily replace querySelector to use our test container
            const originalQuerySelector = document.querySelector.bind(document);
            document.querySelector = function(selector) {
                if (selector === '.links-container') {
                    return document.getElementById('test4-container');
                }
                return originalQuerySelector(selector);
            };

            QuickLinks.renderLinks();

            // Restore original querySelector
            document.querySelector = originalQuerySelector;

            const linkItems = container.querySelectorAll('.link-item');
            const hasOldContent = container.textContent.includes('Old content');
            
            const passed = linkItems.length === 1 && !hasOldContent;
            
            document.getElementById('test4-result').innerHTML = passed ? 
                '<span class="pass">✓ PASS</span>' : 
                '<span class="fail">✗ FAIL</span>';
            
            document.getElementById('test4-result').innerHTML += ` (Old content cleared: ${!hasOldContent})`;
            
            return passed;
        }

        // Test 5: Delete button has × symbol
        function test5() {
            const testLink = {
                id: 'test-5',
                name: 'Test Link',
                url: 'https://example.com',
                createdAt: Date.now()
            };

            const linkElement = QuickLinks.renderLink(testLink);
            const deleteBtn = linkElement.querySelector('.btn-delete-link');
            
            const hasCorrectSymbol = deleteBtn.textContent === '×';
            const hasAriaLabel = deleteBtn.getAttribute('aria-label') !== null;
            
            const passed = hasCorrectSymbol && hasAriaLabel;
            
            document.getElementById('test5-result').innerHTML = passed ? 
                '<span class="pass">✓ PASS</span>' : 
                '<span class="fail">✗ FAIL</span>';
            
            document.getElementById('test5-output').innerHTML = `
                <ul>
                    <li>Symbol: ${hasCorrectSymbol ? '✓' : '✗'} "${deleteBtn.textContent}"</li>
                    <li>aria-label: ${hasAriaLabel ? '✓' : '✗'} "${deleteBtn.getAttribute('aria-label')}"</li>
                </ul>
            `;
            document.getElementById('test5-output').appendChild(linkElement);
            
            return passed;
        }

        // Run all tests
        window.addEventListener('DOMContentLoaded', () => {
            const results = [
                test1(),
                test2(),
                test3(),
                test4(),
                test5()
            ];

            const allPassed = results.every(r => r);
            
            const summary = document.createElement('div');
            summary.className = 'test-section';
            summary.innerHTML = `
                <h2>Test Summary</h2>
                <p class="${allPassed ? 'pass' : 'fail'}">
                    ${results.filter(r => r).length} / ${results.length} tests passed
                </p>
            `;
            document.body.insertBefore(summary, document.body.firstChild);
        });
    </script>
</body>
</html>
