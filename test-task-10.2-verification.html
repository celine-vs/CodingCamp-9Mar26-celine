<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 10.2 Verification - Greeting Widget Styling</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .test-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .test-result {
            margin: 1rem 0;
            padding: 0.75rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .pass {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .fail {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        h1 {
            color: #4a90e2;
            margin-bottom: 1rem;
        }
        h2 {
            color: #2c3e50;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Task 10.2 Verification: Greeting Widget Styling</h1>
        <p><strong>Requirements:</strong> 7.2 (Readable typography), 7.4 (Visual hierarchy)</p>
        
        <h2>Visual Test</h2>
        <section class="greeting-widget" aria-label="Greeting and time display">
            <div class="time-display">10:45:32 AM</div>
            <div class="date-display">Monday, January 15, 2024</div>
            <div class="greeting-message">Good Morning</div>
        </section>
        
        <h2>Automated Style Checks</h2>
        <div id="test-results"></div>
    </div>

    <script>
        function runTests() {
            const results = [];
            const greetingWidget = document.querySelector('.greeting-widget');
            const timeDisplay = document.querySelector('.time-display');
            const dateDisplay = document.querySelector('.date-display');
            const greetingMessage = document.querySelector('.greeting-message');

            // Get computed styles
            const timeStyles = window.getComputedStyle(timeDisplay);
            const dateStyles = window.getComputedStyle(dateDisplay);
            const greetingStyles = window.getComputedStyle(greetingMessage);
            const widgetStyles = window.getComputedStyle(greetingWidget);

            // Test 1: Time display has large, readable font
            const timeFontSize = parseFloat(timeStyles.fontSize);
            results.push({
                name: 'Time display has large font (>= 48px)',
                pass: timeFontSize >= 48,
                actual: `${timeFontSize}px`,
                expected: '>= 48px'
            });

            // Test 2: Time display is bold
            const timeFontWeight = parseInt(timeStyles.fontWeight);
            results.push({
                name: 'Time display is bold (weight >= 600)',
                pass: timeFontWeight >= 600,
                actual: timeFontWeight,
                expected: '>= 600'
            });

            // Test 3: Date display has medium font
            const dateFontSize = parseFloat(dateStyles.fontSize);
            results.push({
                name: 'Date display has medium font (16-24px)',
                pass: dateFontSize >= 16 && dateFontSize <= 24,
                actual: `${dateFontSize}px`,
                expected: '16-24px'
            });

            // Test 4: Greeting message has emphasis (larger font)
            const greetingFontSize = parseFloat(greetingStyles.fontSize);
            results.push({
                name: 'Greeting message has emphasized font (>= 28px)',
                pass: greetingFontSize >= 28,
                actual: `${greetingFontSize}px`,
                expected: '>= 28px'
            });

            // Test 5: Greeting message is semi-bold or bold
            const greetingFontWeight = parseInt(greetingStyles.fontWeight);
            results.push({
                name: 'Greeting message is semi-bold (weight >= 600)',
                pass: greetingFontWeight >= 600,
                actual: greetingFontWeight,
                expected: '>= 600'
            });

            // Test 6: Widget has proper spacing (padding)
            const widgetPadding = parseFloat(widgetStyles.paddingTop);
            results.push({
                name: 'Widget has adequate padding (>= 24px)',
                pass: widgetPadding >= 24,
                actual: `${widgetPadding}px`,
                expected: '>= 24px'
            });

            // Test 7: Widget uses flexbox for alignment
            const widgetDisplay = widgetStyles.display;
            results.push({
                name: 'Widget uses flexbox for alignment',
                pass: widgetDisplay === 'flex',
                actual: widgetDisplay,
                expected: 'flex'
            });

            // Test 8: Widget centers content
            const widgetAlign = widgetStyles.alignItems;
            results.push({
                name: 'Widget centers content (align-items: center)',
                pass: widgetAlign === 'center',
                actual: widgetAlign,
                expected: 'center'
            });

            // Test 9: Visual hierarchy - time is largest
            results.push({
                name: 'Visual hierarchy: time > greeting > date',
                pass: timeFontSize > greetingFontSize && greetingFontSize > dateFontSize,
                actual: `time: ${timeFontSize}px, greeting: ${greetingFontSize}px, date: ${dateFontSize}px`,
                expected: 'time > greeting > date'
            });

            // Display results
            const resultsContainer = document.getElementById('test-results');
            let passCount = 0;
            
            results.forEach(result => {
                const div = document.createElement('div');
                div.className = `test-result ${result.pass ? 'pass' : 'fail'}`;
                div.innerHTML = `
                    <strong>${result.pass ? '✓ PASS' : '✗ FAIL'}:</strong> ${result.name}<br>
                    <small>Expected: ${result.expected} | Actual: ${result.actual}</small>
                `;
                resultsContainer.appendChild(div);
                if (result.pass) passCount++;
            });

            // Summary
            const summary = document.createElement('div');
            summary.className = `test-result ${passCount === results.length ? 'pass' : 'fail'}`;
            summary.innerHTML = `<strong>Summary:</strong> ${passCount}/${results.length} tests passed`;
            resultsContainer.appendChild(summary);

            // Requirements validation
            const reqDiv = document.createElement('div');
            reqDiv.className = `test-result ${passCount === results.length ? 'pass' : 'fail'}`;
            reqDiv.innerHTML = `
                <strong>Requirements Validation:</strong><br>
                <small>
                • Requirement 7.2 (Readable typography): ${passCount >= 7 ? '✓ PASS' : '✗ FAIL'}<br>
                • Requirement 7.4 (Visual hierarchy): ${results[8].pass ? '✓ PASS' : '✗ FAIL'}
                </small>
            `;
            resultsContainer.appendChild(reqDiv);
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
