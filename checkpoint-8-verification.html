<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint 8 - Task Manager & Quick Links Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f7fa;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #4a90e2;
            padding-bottom: 10px;
        }
        h2 {
            color: #34495e;
            margin-top: 30px;
        }
        .test-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .test-output {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .pass { 
            color: #28a745; 
            font-weight: bold;
        }
        .fail { 
            color: #dc3545; 
            font-weight: bold;
        }
        .info { 
            color: #007bff; 
            font-weight: bold;
        }
        .warning {
            color: #ffc107;
            font-weight: bold;
        }
        .summary {
            background: #e8f4f8;
            padding: 15px;
            border-left: 4px solid #4a90e2;
            margin-top: 20px;
        }
        .test-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .test-item:last-child {
            border-bottom: none;
        }
        /* Hide actual components during testing */
        .task-manager, .quick-links {
            display: none;
        }
    </style>
</head>
<body>
    <h1>🔍 Checkpoint 8: Task Manager & Quick Links Verification</h1>
    
    <div class="test-section">
        <h2>Test Results</h2>
        <div class="test-output" id="output"></div>
    </div>

    <!-- Hidden DOM elements for testing -->
    <section class="task-manager">
        <form class="task-form">
            <input type="text" class="task-input" placeholder="Add a new task...">
            <button type="submit" class="btn-add-task">Add</button>
        </form>
        <ul class="task-list"></ul>
    </section>

    <section class="quick-links">
        <form class="link-form">
            <input type="text" class="link-name-input" placeholder="Link name">
            <input type="url" class="link-url-input" placeholder="https://example.com">
            <button type="submit" class="btn-add-link">Add Link</button>
        </form>
        <div class="links-container"></div>
    </section>

    <script src="js/app.js"></script>
    <script>
        const output = document.getElementById('output');
        let passCount = 0;
        let failCount = 0;
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-item ${type}`;
            div.textContent = message;
            output.appendChild(div);
            
            if (type === 'pass') passCount++;
            if (type === 'fail') failCount++;
        }

        function runTests() {
            log('═══════════════════════════════════════════════════════', 'info');
            log('  CHECKPOINT 8: TASK MANAGER & QUICK LINKS VERIFICATION', 'info');
            log('═══════════════════════════════════════════════════════', 'info');
            log('');

            // Clear localStorage before tests
            localStorage.clear();

            // ========================================
            // TASK MANAGER TESTS
            // ========================================
            log('━━━ TASK MANAGER COMPONENT TESTS ━━━', 'info');
            log('');

            // Test 1: Component structure
            log('Test 1: TaskManager component exists and has required methods');
            if (typeof TaskManager === 'object' &&
                typeof TaskManager.init === 'function' &&
                typeof TaskManager.addTask === 'function' &&
                typeof TaskManager.deleteTask === 'function' &&
                typeof TaskManager.updateTask === 'function' &&
                typeof TaskManager.toggleComplete === 'function' &&
                typeof TaskManager.renderTasks === 'function') {
                log('✓ PASS: TaskManager has all required methods', 'pass');
            } else {
                log('✗ FAIL: TaskManager missing required methods', 'fail');
            }
            log('');

            // Test 2: Task creation
            log('Test 2: Task creation with valid description');
            TaskManager.tasks = [];
            const task1 = TaskManager.addTask('Test Task 1');
            if (task1 && task1.description === 'Test Task 1' && TaskManager.tasks.length === 1) {
                log('✓ PASS: Task created successfully', 'pass');
            } else {
                log('✗ FAIL: Task creation failed', 'fail');
            }
            log('');

            // Test 3: Empty task rejection
            log('Test 3: Empty task description rejection');
            const beforeLength = TaskManager.tasks.length;
            const emptyTask = TaskManager.addTask('   ');
            if (emptyTask === null && TaskManager.tasks.length === beforeLength) {
                log('✓ PASS: Empty task rejected', 'pass');
            } else {
                log('✗ FAIL: Empty task was not rejected', 'fail');
            }
            log('');

            // Test 4: Task toggle
            log('Test 4: Task completion toggle');
            const task2 = TaskManager.addTask('Toggle Test');
            const originalStatus = task2.completed;
            TaskManager.toggleComplete(task2.id);
            const newStatus = TaskManager.tasks.find(t => t.id === task2.id).completed;
            if (newStatus === !originalStatus) {
                log('✓ PASS: Task toggle works correctly', 'pass');
            } else {
                log('✗ FAIL: Task toggle failed', 'fail');
            }
            log('');

            // Test 5: Task deletion
            log('Test 5: Task deletion');
            const task3 = TaskManager.addTask('Delete Test');
            const deleteId = task3.id;
            const beforeDelete = TaskManager.tasks.length;
            TaskManager.deleteTask(deleteId);
            const afterDelete = TaskManager.tasks.length;
            const taskExists = TaskManager.tasks.some(t => t.id === deleteId);
            if (afterDelete === beforeDelete - 1 && !taskExists) {
                log('✓ PASS: Task deleted successfully', 'pass');
            } else {
                log('✗ FAIL: Task deletion failed', 'fail');
            }
            log('');

            // Test 6: Task update
            log('Test 6: Task description update');
            const task4 = TaskManager.addTask('Original Description');
            TaskManager.updateTask(task4.id, { description: 'Updated Description' });
            const updatedTask = TaskManager.tasks.find(t => t.id === task4.id);
            if (updatedTask && updatedTask.description === 'Updated Description') {
                log('✓ PASS: Task updated successfully', 'pass');
            } else {
                log('✗ FAIL: Task update failed', 'fail');
            }
            log('');

            // Test 7: Task persistence
            log('Test 7: Task persistence to localStorage');
            TaskManager.tasks = [];
            TaskManager.addTask('Persistent Task');
            const storedTasks = localStorage.getItem('productivity-dashboard-tasks');
            const parsedTasks = JSON.parse(storedTasks);
            if (parsedTasks && parsedTasks.length === 1 && parsedTasks[0].description === 'Persistent Task') {
                log('✓ PASS: Tasks persist to localStorage', 'pass');
            } else {
                log('✗ FAIL: Task persistence failed', 'fail');
            }
            log('');

            // Test 8: Task rendering
            log('Test 8: Task rendering to DOM');
            TaskManager.tasks = [];
            TaskManager.addTask('Render Test 1');
            TaskManager.addTask('Render Test 2');
            TaskManager.renderTasks();
            const taskList = document.querySelector('.task-list');
            const renderedTasks = taskList.querySelectorAll('.task-item');
            if (renderedTasks.length === 2) {
                log('✓ PASS: Tasks rendered correctly', 'pass');
            } else {
                log('✗ FAIL: Task rendering failed', 'fail');
            }
            log('');

            // Test 9: Task form submission
            log('Test 9: Task form submission and input clearing');
            const taskInput = document.querySelector('.task-input');
            taskInput.value = 'Form Test Task';
            TaskManager.handleTaskSubmit();
            if (taskInput.value === '' && TaskManager.tasks.some(t => t.description === 'Form Test Task')) {
                log('✓ PASS: Form submission works and input cleared', 'pass');
            } else {
                log('✗ FAIL: Form submission or input clearing failed', 'fail');
            }
            log('');

            // ========================================
            // QUICK LINKS TESTS
            // ========================================
            log('━━━ QUICK LINKS COMPONENT TESTS ━━━', 'info');
            log('');

            // Test 10: Component structure
            log('Test 10: QuickLinks component exists and has required methods');
            if (typeof QuickLinks === 'object' &&
                typeof QuickLinks.init === 'function' &&
                typeof QuickLinks.addLink === 'function' &&
                typeof QuickLinks.deleteLink === 'function' &&
                typeof QuickLinks.validateUrl === 'function' &&
                typeof QuickLinks.renderLinks === 'function') {
                log('✓ PASS: QuickLinks has all required methods', 'pass');
            } else {
                log('✗ FAIL: QuickLinks missing required methods', 'fail');
            }
            log('');

            // Test 11: Link creation with valid URL
            log('Test 11: Link creation with valid URL');
            QuickLinks.links = [];
            const link1 = QuickLinks.addLink('Google', 'https://google.com');
            if (link1 && link1.name === 'Google' && link1.url === 'https://google.com' && QuickLinks.links.length === 1) {
                log('✓ PASS: Link created successfully', 'pass');
            } else {
                log('✗ FAIL: Link creation failed', 'fail');
            }
            log('');

            // Test 12: Empty name rejection
            log('Test 12: Empty link name rejection');
            const beforeLinkLength = QuickLinks.links.length;
            const emptyNameLink = QuickLinks.addLink('   ', 'https://example.com');
            if (emptyNameLink === null && QuickLinks.links.length === beforeLinkLength) {
                log('✓ PASS: Empty name rejected', 'pass');
            } else {
                log('✗ FAIL: Empty name was not rejected', 'fail');
            }
            log('');

            // Test 13: Empty URL rejection
            log('Test 13: Empty URL rejection');
            const beforeUrlLength = QuickLinks.links.length;
            const emptyUrlLink = QuickLinks.addLink('Test', '   ');
            if (emptyUrlLink === null && QuickLinks.links.length === beforeUrlLength) {
                log('✓ PASS: Empty URL rejected', 'pass');
            } else {
                log('✗ FAIL: Empty URL was not rejected', 'fail');
            }
            log('');

            // Test 14: Invalid URL protocol rejection
            log('Test 14: Invalid URL protocol rejection');
            const beforeProtocolLength = QuickLinks.links.length;
            const invalidProtocol = QuickLinks.addLink('Test', 'google.com');
            if (invalidProtocol === null && QuickLinks.links.length === beforeProtocolLength) {
                log('✓ PASS: Invalid protocol rejected', 'pass');
            } else {
                log('✗ FAIL: Invalid protocol was not rejected', 'fail');
            }
            log('');

            // Test 15: URL validation
            log('Test 15: URL validation function');
            const validHttps = QuickLinks.validateUrl('https://example.com');
            const validHttp = QuickLinks.validateUrl('http://example.com');
            const invalidUrl = QuickLinks.validateUrl('example.com');
            if (validHttps && validHttp && !invalidUrl) {
                log('✓ PASS: URL validation works correctly', 'pass');
            } else {
                log('✗ FAIL: URL validation failed', 'fail');
            }
            log('');

            // Test 16: Link deletion
            log('Test 16: Link deletion');
            const link2 = QuickLinks.addLink('Delete Test', 'https://delete.com');
            const linkDeleteId = link2.id;
            const beforeLinkDelete = QuickLinks.links.length;
            QuickLinks.deleteLink(linkDeleteId);
            const afterLinkDelete = QuickLinks.links.length;
            const linkExists = QuickLinks.links.some(l => l.id === linkDeleteId);
            if (afterLinkDelete === beforeLinkDelete - 1 && !linkExists) {
                log('✓ PASS: Link deleted successfully', 'pass');
            } else {
                log('✗ FAIL: Link deletion failed', 'fail');
            }
            log('');

            // Test 17: Link persistence
            log('Test 17: Link persistence to localStorage');
            QuickLinks.links = [];
            QuickLinks.addLink('Persistent Link', 'https://persistent.com');
            const storedLinks = localStorage.getItem('productivity-dashboard-links');
            const parsedLinks = JSON.parse(storedLinks);
            if (parsedLinks && parsedLinks.length === 1 && parsedLinks[0].name === 'Persistent Link') {
                log('✓ PASS: Links persist to localStorage', 'pass');
            } else {
                log('✗ FAIL: Link persistence failed', 'fail');
            }
            log('');

            // Test 18: Link rendering
            log('Test 18: Link rendering to DOM');
            QuickLinks.links = [];
            QuickLinks.addLink('Link 1', 'https://link1.com');
            QuickLinks.addLink('Link 2', 'https://link2.com');
            QuickLinks.renderLinks();
            const linksContainer = document.querySelector('.links-container');
            const renderedLinks = linksContainer.querySelectorAll('.link-item');
            if (renderedLinks.length === 2) {
                log('✓ PASS: Links rendered correctly', 'pass');
            } else {
                log('✗ FAIL: Link rendering failed', 'fail');
            }
            log('');

            // Test 19: Link target attribute
            log('Test 19: Links open in new tab (target="_blank")');
            QuickLinks.links = [];
            QuickLinks.addLink('Target Test', 'https://target.com');
            QuickLinks.renderLinks();
            const linkAnchor = document.querySelector('.link-button');
            if (linkAnchor && linkAnchor.getAttribute('target') === '_blank') {
                log('✓ PASS: Links have target="_blank" attribute', 'pass');
            } else {
                log('✗ FAIL: Links missing target="_blank" attribute', 'fail');
            }
            log('');

            // Test 20: Link form submission
            log('Test 20: Link form submission and input clearing');
            const nameInput = document.querySelector('.link-name-input');
            const urlInput = document.querySelector('.link-url-input');
            nameInput.value = 'Form Link';
            urlInput.value = 'https://formlink.com';
            QuickLinks.handleLinkSubmit();
            if (nameInput.value === '' && urlInput.value === '' && QuickLinks.links.some(l => l.name === 'Form Link')) {
                log('✓ PASS: Form submission works and inputs cleared', 'pass');
            } else {
                log('✗ FAIL: Form submission or input clearing failed', 'fail');
            }
            log('');

            // ========================================
            // INTEGRATION TESTS
            // ========================================
            log('━━━ INTEGRATION TESTS ━━━', 'info');
            log('');

            // Test 21: Both components initialized
            log('Test 21: Both components can be initialized together');
            try {
                localStorage.clear();
                TaskManager.init();
                QuickLinks.init();
                log('✓ PASS: Both components initialized without errors', 'pass');
            } catch (error) {
                log('✗ FAIL: Initialization error: ' + error.message, 'fail');
            }
            log('');

            // Test 22: Storage isolation
            log('Test 22: Components use separate localStorage keys');
            TaskManager.tasks = [];
            QuickLinks.links = [];
            TaskManager.addTask('Task Storage Test');
            QuickLinks.addLink('Link Storage Test', 'https://storage.com');
            const taskKey = localStorage.getItem('productivity-dashboard-tasks');
            const linkKey = localStorage.getItem('productivity-dashboard-links');
            if (taskKey && linkKey && taskKey !== linkKey) {
                log('✓ PASS: Components use separate storage keys', 'pass');
            } else {
                log('✗ FAIL: Storage isolation failed', 'fail');
            }
            log('');

            // ========================================
            // SUMMARY
            // ========================================
            log('');
            log('═══════════════════════════════════════════════════════', 'info');
            log('  TEST SUMMARY', 'info');
            log('═══════════════════════════════════════════════════════', 'info');
            log('');
            
            const totalTests = passCount + failCount;
            const passRate = ((passCount / totalTests) * 100).toFixed(1);
            
            log(`Total Tests: ${totalTests}`, 'info');
            log(`Passed: ${passCount}`, 'pass');
            log(`Failed: ${failCount}`, failCount > 0 ? 'fail' : 'info');
            log(`Pass Rate: ${passRate}%`, passRate === '100.0' ? 'pass' : 'warning');
            log('');

            if (failCount === 0) {
                log('🎉 ALL TESTS PASSED! 🎉', 'pass');
                log('');
                log('✓ Task Manager component is fully functional', 'pass');
                log('✓ Quick Links component is fully functional', 'pass');
                log('✓ Both components work together correctly', 'pass');
                log('✓ Data persistence is working properly', 'pass');
                log('✓ All validation rules are enforced', 'pass');
                log('');
                log('Checkpoint 8 verification COMPLETE ✓', 'pass');
            } else {
                log('⚠ SOME TESTS FAILED', 'fail');
                log('Please review the failed tests above and fix the issues.', 'warning');
            }
        }

        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
