<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1>Productivity Dashboard</h1>
        </header>

        <section class="greeting-widget" aria-label="Greeting and time display">
            <div class="time-display"></div>
            <div class="date-display"></div>
            <div class="greeting-message"></div>
        </section>

        <section class="focus-timer" aria-label="Focus timer">
            <h2>Focus Timer</h2>
            <div class="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="btn-start" aria-label="Start timer">Start</button>
                <button class="btn-stop" aria-label="Stop timer">Stop</button>
                <button class="btn-reset" aria-label="Reset timer">Reset</button>
            </div>
            <div class="timer-status"></div>
        </section>

        <section class="task-manager" aria-label="Task manager">
            <h2>Tasks</h2>
            <form class="task-form">
                <input type="text" class="task-input" placeholder="Add a new task..." aria-label="New task description">
                <button type="submit" class="btn-add-task">Add</button>
            </form>
            <ul class="task-list"></ul>
        </section>

        <section class="quick-links" aria-label="Quick links">
            <h2>Quick Links</h2>
            <form class="link-form">
                <input type="text" class="link-name-input" placeholder="Link name" aria-label="Link name">
                <input type="url" class="link-url-input" placeholder="https://example.com" aria-label="Link URL">
                <button type="submit" class="btn-add-link">Add Link</button>
            </form>
            <div class="links-container"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
