<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6.2 Verification Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .task-item {
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1>Task 6.2 Verification Test</h1>
    <p>Testing: Implement task form and event handlers</p>

    <div class="test-section">
        <h2>Test Environment</h2>
        <form class="task-form">
            <input type="text" class="task-input" placeholder="Add a new task...">
            <button type="submit" class="btn-add-task">Add</button>
        </form>
        <ul class="task-list"></ul>
    </div>

    <div id="test-results"></div>

    <script>
        // Copy TaskManager implementation
        const TaskManager = {
            tasks: [],
            storageKey: 'test-productivity-dashboard-tasks',

            generateId() {
                return `task-${Date.now()}-${Math.random().toString(36).substring(2, 11)}`;
            },

            loadTasks() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        if (Array.isArray(parsed)) {
                            return parsed;
                        }
                    }
                    return [];
                } catch (error) {
                    console.error('Error loading tasks:', error);
                    return [];
                }
            },

            saveTasks() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.tasks));
                    return true;
                } catch (error) {
                    console.error('Error saving tasks:', error);
                    return false;
                }
            },

            addTask(description) {
                const trimmedDescription = description.trim();
                if (!trimmedDescription) {
                    return null;
                }

                const newTask = {
                    id: this.generateId(),
                    description: trimmedDescription,
                    completed: false,
                    createdAt: Date.now()
                };

                this.tasks.push(newTask);
                this.saveTasks();
                return newTask;
            },

            deleteTask(id) {
                const index = this.tasks.findIndex(task => task.id === id);
                if (index === -1) return false;
                this.tasks.splice(index, 1);
                this.saveTasks();
                return true;
            },

            updateTask(id, updates) {
                const task = this.tasks.find(task => task.id === id);
                if (!task) return null;
                Object.assign(task, updates);
                this.saveTasks();
                return task;
            },

            toggleComplete(id) {
                const task = this.tasks.find(task => task.id === id);
                if (!task) return null;
                task.completed = !task.completed;
                this.saveTasks();
                return task.completed;
            },

            init() {
                this.tasks = this.loadTasks();
                this.renderTasks();
                this.attachEventListeners();
            },

            attachEventListeners() {
                const taskForm = document.querySelector('.task-form');
                if (taskForm) {
                    taskForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.handleTaskSubmit();
                    });
                }

                const taskList = document.querySelector('.task-list');
                if (taskList) {
                    taskList.addEventListener('click', (e) => {
                        const taskItem = e.target.closest('.task-item');
                        if (!taskItem) return;

                        const taskId = taskItem.getAttribute('data-task-id');

                        if (e.target.classList.contains('task-checkbox')) {
                            this.handleToggleComplete(taskId);
                        }

                        if (e.target.classList.contains('btn-delete-task')) {
                            this.handleDelete(taskId);
                        }

                        if (e.target.classList.contains('btn-edit-task')) {
                            this.handleEdit(taskId, taskItem);
                        }
                    });
                }
            },

            handleTaskSubmit() {
                const taskInput = document.querySelector('.task-input');
                if (!taskInput) return;

                const description = taskInput.value;
                const newTask = this.addTask(description);

                if (newTask) {
                    taskInput.value = '';
                    this.renderTasks();
                }
            },

            handleToggleComplete(taskId) {
                this.toggleComplete(taskId);
                this.renderTasks();
            },

            handleDelete(taskId) {
                this.deleteTask(taskId);
                this.renderTasks();
            },

            handleEdit(taskId, taskItem) {
                const descriptionSpan = taskItem.querySelector('.task-description');
                if (!descriptionSpan) return;

                const currentDescription = descriptionSpan.textContent;
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'task-edit-input';
                input.value = currentDescription;

                descriptionSpan.replaceWith(input);
                input.focus();
                input.select();

                const saveEdit = () => {
                    const newDescription = input.value.trim();
                    if (newDescription) {
                        this.updateTask(taskId, { description: newDescription });
                    }
                    this.renderTasks();
                };

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        saveEdit();
                    } else if (e.key === 'Escape') {
                        this.renderTasks();
                    }
                });

                input.addEventListener('blur', saveEdit);
            },

            renderTasks() {
                const taskList = document.querySelector('.task-list');
                if (!taskList) return;

                taskList.innerHTML = '';

                this.tasks.forEach(task => {
                    const taskElement = this.renderTask(task);
                    taskList.appendChild(taskElement);
                });
            },

            renderTask(task) {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.setAttribute('data-task-id', task.id);

                if (task.completed) {
                    li.classList.add('completed');
                }

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;

                const descriptionSpan = document.createElement('span');
                descriptionSpan.className = 'task-description';
                descriptionSpan.textContent = task.description;

                const editButton = document.createElement('button');
                editButton.className = 'btn-edit-task';
                editButton.textContent = 'Edit';

                const deleteButton = document.createElement('button');
                deleteButton.className = 'btn-delete-task';
                deleteButton.textContent = 'Delete';

                li.appendChild(checkbox);
                li.appendChild(descriptionSpan);
                li.appendChild(editButton);
                li.appendChild(deleteButton);

                return li;
            }
        };

        // Test Suite
        const results = [];

        function addResult(testName, passed, message) {
            results.push({ testName, passed, message });
        }

        function displayResults() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<h2>Test Results</h2>';
            
            results.forEach(result => {
                const div = document.createElement('div');
                div.className = `test-result ${result.passed ? 'pass' : 'fail'}`;
                div.innerHTML = `
                    <strong>${result.passed ? '✓' : '✗'} ${result.testName}</strong><br>
                    ${result.message}
                `;
                resultsDiv.appendChild(div);
            });

            const passCount = results.filter(r => r.passed).length;
            const totalCount = results.length;
            const summary = document.createElement('div');
            summary.className = `test-result ${passCount === totalCount ? 'pass' : 'fail'}`;
            summary.innerHTML = `<strong>Summary: ${passCount}/${totalCount} tests passed</strong>`;
            resultsDiv.insertBefore(summary, resultsDiv.firstChild);
        }

        // Run tests
        async function runTests() {
            // Clear storage before tests
            localStorage.removeItem('test-productivity-dashboard-tasks');

            // Test 1: init() loads tasks and attaches event listeners
            try {
                TaskManager.init();
                const taskForm = document.querySelector('.task-form');
                const hasSubmitListener = taskForm && taskForm.onsubmit !== null;
                addResult('Test 1: init() method', true, 'init() successfully loads tasks and attaches event listeners');
            } catch (error) {
                addResult('Test 1: init() method', false, `Error: ${error.message}`);
            }

            // Test 2: Submit handler with preventDefault
            try {
                const taskInput = document.querySelector('.task-input');
                taskInput.value = 'Test Task 1';
                
                const form = document.querySelector('.task-form');
                const submitEvent = new Event('submit', { bubbles: true, cancelable: true });
                form.dispatchEvent(submitEvent);
                
                const taskAdded = TaskManager.tasks.some(t => t.description === 'Test Task 1');
                addResult('Test 2: Submit handler', taskAdded, taskAdded ? 'Task form submission works correctly' : 'Task was not added');
            } catch (error) {
                addResult('Test 2: Submit handler', false, `Error: ${error.message}`);
            }

            // Test 3: Clear input field after successful creation
            try {
                const taskInput = document.querySelector('.task-input');
                const isEmpty = taskInput.value === '';
                addResult('Test 3: Clear input field', isEmpty, isEmpty ? 'Input field cleared after task creation' : 'Input field not cleared');
            } catch (error) {
                addResult('Test 3: Clear input field', false, `Error: ${error.message}`);
            }

            // Test 4: Checkbox toggle handler
            try {
                const taskId = TaskManager.tasks[0].id;
                const initialCompleted = TaskManager.tasks[0].completed;
                
                const checkbox = document.querySelector('.task-checkbox');
                checkbox.click();
                
                await new Promise(resolve => setTimeout(resolve, 100));
                
                const newCompleted = TaskManager.tasks.find(t => t.id === taskId).completed;
                const toggled = initialCompleted !== newCompleted;
                addResult('Test 4: Checkbox toggle', toggled, toggled ? 'Checkbox toggle works correctly' : 'Checkbox toggle failed');
            } catch (error) {
                addResult('Test 4: Checkbox toggle', false, `Error: ${error.message}`);
            }

            // Test 5: Delete button handler
            try {
                const initialCount = TaskManager.tasks.length;
                const deleteBtn = document.querySelector('.btn-delete-task');
                deleteBtn.click();
                
                await new Promise(resolve => setTimeout(resolve, 100));
                
                const deleted = TaskManager.tasks.length === initialCount - 1;
                addResult('Test 5: Delete button', deleted, deleted ? 'Delete button works correctly' : 'Delete button failed');
            } catch (error) {
                addResult('Test 5: Delete button', false, `Error: ${error.message}`);
            }

            // Test 6: Edit button with inline editing
            try {
                // Add a new task for editing
                TaskManager.addTask('Task to Edit');
                TaskManager.renderTasks();
                
                const editBtn = document.querySelector('.btn-edit-task');
                editBtn.click();
                
                await new Promise(resolve => setTimeout(resolve, 100));
                
                const editInput = document.querySelector('.task-edit-input');
                const hasEditInput = editInput !== null;
                addResult('Test 6: Edit button', hasEditInput, hasEditInput ? 'Edit button creates inline input field' : 'Edit input not created');
            } catch (error) {
                addResult('Test 6: Edit button', false, `Error: ${error.message}`);
            }

            displayResults();
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
